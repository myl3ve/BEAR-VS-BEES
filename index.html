<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐻 Bear vs Bees — Survie</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/screens.css">
</head>
<body>

<!-- ══ ENVIRONNEMENT ══ -->
<div id="bg"></div>
<div id="ground"></div>

<!-- ══ ZONE DE JEU ══ -->
<div id="game"></div>
<div id="shield-bubble"></div>
<div id="slowmo-overlay"></div>

<!-- ══ PERSONNAGE ══ -->
<div id="bear">
  <img src="assets/svg/bear.svg" alt="Bear character" draggable="false"/>
</div>

<!-- ══ HUD ══ -->
<div id="hud">
  <div>
    <div id="hud-title">🐻 Bear vs Bees</div>
    <div id="hud-pseudo"></div>
  </div>
  <div id="hearts">
    <span class="heart" id="h1">❤️</span>
    <span class="heart" id="h2">❤️</span>
    <span class="heart" id="h3">❤️</span>
  </div>
  <div id="score-display">
    <div id="score-label">Score</div>
    <div id="score-num">0</div>
  </div>
  <div id="shield-hud">🛡️ BOUCLIER</div>
</div>

<div id="slowmo-hud">⏳ RALENTI !</div>

<!-- ══ COMBO ══ -->
<div id="combo-display">
  <div id="combo-text">🐝 Bien visé !</div>
  <div id="combo-bar-bg"><div id="combo-bar"></div></div>
</div>

<!-- ══ ALERTES ══ -->
<div id="queen-alert">👑 REINE DES ABEILLES ! 👑</div>
<div id="wasp-alert">🐝 GUÊPES EN APPROCHE ! ⚠️</div>

<!-- ══ BARRE DE TEMPS ══ -->
<div id="timer-wrap">
  <div id="timer-label">⏱ SURVIE</div>
  <div id="timer-bar-bg"><div id="timer-bar"></div></div>
</div>

<div id="screens-root"></div>

<script src="js/screens-template.js"></script>
<script src="js/state.js"></script>
<script src="js/audio.js"></script>
<script src="js/assets.js"></script>
<script src="js/environment.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
